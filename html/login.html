<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  height:100vh;
  background:#eaf2ff;
  position:relative;
  overflow:hidden;
}

.forgot{
  text-align:right;
  margin-bottom:10px;
}

.forgot a{
  font-size:13px;
  color:#3b82f6;
  text-decoration:none;
}

/* SVG BACKGROUND LAYERS */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:0;
}

/* NAVBAR */
.navbar{
  position:relative;
  z-index:2;
  margin:20px;
  padding:15px 30px;
  background:#fff;
  border-radius:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.logo{font-size:20px;font-weight:600;color:#3b82f6;}

.nav-links{display:flex;gap:35px;}

.nav-links a{text-decoration:none;color:#666;font-weight:500;}

.nav-links a.active{
  color:#3b82f6;
  border-bottom:2px solid #3b82f6;
  padding-bottom:5px;
}

.help-btn{
  background:linear-gradient(135deg,#4f8cff,#2b6cff);
  border:none;color:#fff;
  padding:10px 20px;border-radius:20px;
}

/* MAIN */
.container{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:50px;
  margin-top:40px;
}

/* LEFT CARD */
.card{
  width:380px;
  padding:30px;
  background:#fff;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.card h2{text-align:center;margin-bottom:10px;color:#2c3e50;}
.card p{text-align:center;color:#777;margin-bottom:25px;}

.input{margin-bottom:15px;}

.input input{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid #e0e0e0;
  background:#f4f8ff;
  outline:none;
}

.signin{
  width:100%;margin-top:10px;padding:13px;
  border:none;border-radius:25px;
  background:linear-gradient(135deg,#4f8cff,#2b6cff);
  color:#fff;font-size:16px;cursor:pointer;
  padding-left: 128px;
  padding-right: 128px;
  text-align:center ;
}
.signin {
  text-decoration: none;
}

.signup{text-align:center;margin-top:15px;font-size:14px;}
.signup a{color:#3b82f6;text-decoration:none;}

/* RIGHT CARD */
.profile{
  width:300px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.profile-top{
  background:linear-gradient(135deg,#4f8cff,#2b6cff);
  padding:30px;text-align:center;color:#fff;
}



.profile-bottom{background:#fff;padding:20px;}

.info{display:flex;align-items:center;gap:10px;margin-bottom:10px;color:#555;}

</style>
</head>

<body>

<!-- SVG BACKGROUND (same style abstract UI) -->
<svg class="bg" viewBox="0 0 1440 800" preserveAspectRatio="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="800" fill="url(#g1)"/>

  <!-- Waves -->
  <path d="M0,600 C300,500 500,700 800,600 C1100,500 1300,700 1440,650 L1440,800 L0,800 Z" fill="#c7dbff" opacity="0.6"/>
  <path d="M0,650 C300,550 500,750 800,650 C1100,550 1300,750 1440,700 L1440,800 L0,800 Z" fill="#a7c7ff" opacity="0.6"/>

  <!-- fake cards shapes -->
  <rect x="950" y="300" width="300" height="150" rx="15" fill="#ffffff" opacity="0.4"/>
  <rect x="1050" y="200" width="250" height="120" rx="15" fill="#ffffff" opacity="0.3"/>

</svg>

<div class="navbar">
  
   <img src="../image/Flatsewalogo.jpeg" alt="Logo" height="100px" width="100px">
  <div class="nav-links">
    <a class="active"><h2>Login</h2></a>
    
   
   
  </div>
  <button class="help-btn">Help</a>
</div>

<div class="container">

  <div class="card">
    <h2>Welcome </h2>
    <p>Sign up or Log in to your account</p>
    
    <div class="input"><input type="tel" id="number" placeholder="Phone Number"></div>
   
    <div class="input">
  <input type="password" id="password" placeholder="Password">
</div>

<div class="forgot">
  <a href="./Forget.html">Forgot Password</a>
</div>
<br>
    <a class="signin" href="./Flatsewa.html">Sign In</a>
    <br>
    <div class="signup">Don't have an account? <a>Sign Up</a></div>
  </div>

  <div class="profile">
    <div class="profile-top">
      
       <div class="icon-box">
  <i class="fa-solid fa-user"></i>
</div>
     
      <h3>Username</h3>
      <p>ID: STU1023</p>
    </div>

    <div class="profile-bottom">
      <div class="info">📞 Phone : ****</div>
      <div class="info">✉️ Email : ****</div>
    </div>
  </div>

</div>
<script>
    
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "shivam" && pass === "1234") {
        window.location.href = "Flatsewa.html";
    } else {
        alert("Wrong credentials");
    }
}

function showSignup(){
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "block";
}

function showLogin(){
  document.getElementById("signupForm").style.display = "none";
  document.getElementById("loginForm").style.display = "block";
}
</script>

</body>
</html>
